name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.14.1
      - run: zig build perft -Doptimize=ReleaseFast
      - run: zig build-exe src/web.zig -target wasm32-freestanding -fstrip -O ReleaseFast -femit-bin=web/main.wasm -fno-entry -rdynamic
      - run: |
          git clone https://github.com/LukeGrahamLandry/franca.git
          cd franca
          git checkout bd88c9227f3e73527da533e24bdbd8858e71391d
          ./boot/strap.sh -no-test
      - run: |
          cd franca
          ./target/franca.out examples/default_driver.fr build examples/chess/web.fr -arch wasm32 -dynamiclib -o ../web/main_fr.wasm -unsafe
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: web
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
